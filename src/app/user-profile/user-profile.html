<!-- PROFILE EDIT -->
<mat-card style="margin: 20px; max-width: 640px;">
  <mat-card-header>
    <mat-card-title>Edit Profile</mat-card-title>
    <mat-card-subtitle>
      Current Username: <strong>{{ user.Username }}</strong>
    </mat-card-subtitle>
  </mat-card-header>

  <mat-card-content>
    <!-- ✅ Put password inside a form to remove the warning -->
    <form (ngSubmit)="updateProfile()" #profileForm="ngForm" style="display: grid; gap: 12px; margin-top: 12px;">
      <mat-form-field appearance="outline">
        <mat-label>Username</mat-label>
        <input
          matInput
          [(ngModel)]="editData.Username"
          name="Username"
          required
          minlength="5"
          autocomplete="username"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Email</mat-label>
        <input
          matInput
          [(ngModel)]="editData.Email"
          name="Email"
          required
          email
          autocomplete="email"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>Birthday</mat-label>
        <input
          matInput
          type="date"
          [(ngModel)]="editData.Birthday"
          name="Birthday"
          autocomplete="bday"
        />
      </mat-form-field>

      <mat-form-field appearance="outline">
        <mat-label>New Password (optional)</mat-label>
        <input
          matInput
          type="password"
          [(ngModel)]="editData.Password"
          name="Password"
          autocomplete="new-password"
        />
        <mat-hint>Leave empty to keep your current password.</mat-hint>
      </mat-form-field>

      <div style="display:flex; gap: 10px; justify-content:flex-end; margin-top: 4px;">
        <button
          mat-raised-button
          color="primary"
          type="submit"
          [disabled]="profileForm.invalid"
        >
          Save changes
        </button>
      </div>
    </form>
  </mat-card-content>
</mat-card>

<!-- FAVORITES -->
<mat-card style="margin: 20px; max-width: 900px;">
  <mat-card-header>
    <mat-card-title>Favorite Movies</mat-card-title>
  </mat-card-header>

  <mat-card-content>
    <p *ngIf="favoriteMovies.length === 0" style="opacity: 0.8; margin: 0;">
      No favorites yet.
    </p>

    <div
      *ngFor="let movie of favoriteMovies"
      style="
        display:flex;
        gap: 14px;
        align-items:center;
        padding: 10px 0;
        border-bottom: 1px solid rgba(0,0,0,0.08);
      "
    >
      <img
        [src]="movie.ImagePath"
        [alt]="movie.Title"
        width="60"
        height="90"
        loading="lazy"
        style="object-fit: cover; border-radius: 6px;"
      />

      <div style="flex: 1; min-width: 0;">
        <div style="font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis;">
          {{ movie.Title }}
        </div>
        <div style="opacity: 0.8;">
          {{ movie.Genre?.Name }}
        </div>
      </div>

      <button mat-stroked-button color="warn" (click)="removeFromFavorites(movie)">
        Remove
      </button>
    </div>
  </mat-card-content>
</mat-card>
