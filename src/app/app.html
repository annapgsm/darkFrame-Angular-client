<!-- Only show navbar when logged in -->
<ng-container *ngIf="isLoggedIn()">
  <mat-toolbar color="primary" style="display: flex; gap: 10px;">
    <span style="font-weight: 600; cursor: pointer;" routerLink="/movies">
      DarkFrame
    </span>

    <span style="flex: 1 1 auto;"></span>

    <button mat-button routerLink="/movies">Movies</button>
    <button mat-button routerLink="/profile">Profile</button>
    <button mat-button (click)="logout()">Logout</button>
  </mat-toolbar>
</ng-container>

<div style="padding: 10px;">
  <router-outlet></router-outlet>
</div>
